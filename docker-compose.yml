version: '3.8'

services:
  db:
    image: postgres:13
    environment:
      POSTGRES_DB: product_scanner_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: example
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:6
    ports:
      - "6379:6379"

  backend:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

volumes:
  pgdata: